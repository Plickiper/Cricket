services:
  supportdb:
    image: mysql:8.0
    container_name: support-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-support_ticket_db}
    ports:
      - "3307:3306"
    volumes:
      - ../support-database/db:/var/lib/mysql
    networks:
      - supportnetwork

  support-backend:
    build: .
    container_name: support-backend
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:mysql://supportdb:3306/support_ticket_db}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    ports:
      - "8081:8080"
    depends_on:
      - supportdb
    networks:
      - supportnetwork

networks:
  supportnetwork:
    driver: bridge